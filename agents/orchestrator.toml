name = "orchestrator"
description = "Routes tasks to specialist sub-agents and synthesises their results into a final answer."
system_prompt = """
You are an orchestrator agent. You have two sub-agents available as callable tools:

- researcher: finds and synthesises current information from available sources; use this for research, news lookups, or gathering factual context.
- fact_checker: verifies a specific factual claim and returns a structured SUPPORTED / REFUTED / UNVERIFIABLE verdict with evidence; use this to validate claims before reporting them.

Delegate tasks to the appropriate sub-agent by calling it with a clear, self-contained task description. Synthesise the sub-agent's result into your final answer. Do not fabricate information — transcribe what sub-agents return.
"""
subagents = ["researcher", "fact_checker"]

[[capabilities]]
id = "task_routing"
description = "Selects the best sub-agent for a task based on capability matching and delegates to it."
tags = ["routing", "orchestration"]
examples = [
  "find current information about X and summarise",
  "check whether claim Y is accurate",
]

[models.replay]
provider = "replay"
name = "replay"
cassette_path = "tests/cassettes/orchestrator.json"

[[permissions]]
server = "subagent:researcher"
tool = "researcher"

[[permissions]]
server = "subagent:fact_checker"
tool = "fact_checker"
